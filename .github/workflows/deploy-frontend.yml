name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_DEPLOYMENT_URL: ${{ secrets.VERCEL_DEPLOYMENT_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: BetaHuhn/deploy-to-vercel-action@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          WORKING_DIRECTORY: 'frontend'
          PRODUCTION: true

      - name: Verify frontend is live
        if: ${{ env.VERCEL_DEPLOYMENT_URL != '' }}
        run: |
          for i in {1..30}; do
            if curl -fsS "https://$VERCEL_DEPLOYMENT_URL/"; then
              echo "✅ Frontend is live and responding"
              exit 0
            fi
            echo "Attempt $i/30: Waiting for frontend..."
            sleep 10
          done
          echo "❌ Frontend failed to respond after 5 minutes"
          exit 1
