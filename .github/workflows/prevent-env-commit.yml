name: Prevent .env commits

on:
  push:
  pull_request:

jobs:
  block-env:
    name: Fail if repository contains tracked .env files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail if tracked .env files exist
        run: |
          set -e
          echo "Checking for tracked .env files..."
          found=$(git ls-files | grep -E '(^|/)\.env($|\.|/)' || true)
          if [ -n "$found" ]; then
            echo "ERROR: Tracked .env files detected in repository:" >&2
            echo "$found" >&2
            echo "Remove any .env files from the repo, add them to .gitignore, and rotate any exposed secrets." >&2
            exit 1
          fi

      - name: Success - no tracked .env files
        if: ${{ success() }}
        run: echo "No tracked .env files found."
